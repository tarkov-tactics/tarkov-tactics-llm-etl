name: ETL Pipeline

on:
  schedule:
    # Weekly drift check — Sunday at 04:17 UTC
    - cron: '17 4 * * 0'
  workflow_dispatch:
    inputs:
      force_fetch:
        description: 'Force refetch all sources even if cached'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore source cache
        uses: actions/cache@v4
        with:
          path: work/raw
          key: etl-sources-${{ hashFiles('etl.config.json') }}-${{ github.run_id }}
          restore-keys: |
            etl-sources-${{ hashFiles('etl.config.json') }}-

      # Fetch SPT looseLoot.json files via git sparse-checkout + LFS
      # These are >5MB and tracked by Git LFS; raw GitHub URLs return LFS pointers.
      - name: Fetch SPT loot data (LFS)
        run: |
          mkdir -p work/raw/spt
          GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/sp-tarkov/server.git /tmp/spt-server
          cd /tmp/spt-server
          git sparse-checkout set project/assets/database/locations
          # Copy resolved LFS files into our work directory
          if [ -d "project/assets/database/locations" ]; then
            cp -r project/assets/database/locations/* $GITHUB_WORKSPACE/work/raw/spt/locations/ 2>/dev/null || true
          fi

      - name: Run ETL pipeline (stages 1-6, no LLM)
        run: npm run etl:run
        env:
          ETL_WORK_DIR: ./work

      # Stage 5 with LLM: re-run with credentials, then re-validate
      - name: Run stage 5 (LLM enrichment)
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          npm run stage:quests
          npm run stage:validate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          ETL_WORK_DIR: ./work

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            work/publish/validation-report.md
            work/stage5/quest-enhancements.diff.md

      - name: Create PR for LLM-enriched data
        if: ${{ secrets.ANTHROPIC_API_KEY != '' && success() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "work/stage5/quest-enhancements.diff.md" ]; then
            BRANCH="etl/quest-enrichment-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            mkdir -p publish
            cp work/publish/* publish/
            git add publish/
            git commit -m "chore: update ETL data with LLM enrichments"
            git push origin "$BRANCH"
            gh pr create \
              --title "ETL: Quest enrichment update ($(date +%Y-%m-%d))" \
              --body "$(cat work/stage5/quest-enhancements.diff.md)" \
              --label "etl,needs-review"
          fi

      - name: Publish to gh-pages (no LLM data)
        if: ${{ secrets.ANTHROPIC_API_KEY == '' && success() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION=$(jq -r '.version' work/publish/manifest.json)

          mkdir -p "gh-pages-staging/v/$VERSION"
          mkdir -p "gh-pages-staging/latest"

          cp work/publish/*.json "gh-pages-staging/v/$VERSION/"
          cp work/publish/*.json "gh-pages-staging/latest/"

          git checkout --orphan gh-pages-deploy
          git rm -rf . 2>/dev/null || true
          cp -r gh-pages-staging/* .
          git add -A
          git commit -m "Deploy ETL data v$VERSION"
          git push origin HEAD:gh-pages --force
